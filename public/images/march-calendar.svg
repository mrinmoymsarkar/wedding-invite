<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" width="720" height="620">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B1A1A"/>
      <stop offset="100%" stop-color="#6B0F0F"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="10" y="10" width="700" height="600" rx="16" ry="16" fill="#FFFDF7" filter="url(#shadow)" stroke="#E8DCC8" stroke-width="1"/>

  <!-- Header -->
  <rect x="10" y="10" width="700" height="90" rx="16" ry="16" fill="url(#headerGrad)"/>
  <rect x="10" y="60" width="700" height="40" fill="url(#headerGrad)"/>

  <text x="360" y="50" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="32" font-weight="bold" fill="#FFFDF7" letter-spacing="2">MARCH 2026</text>
  <text x="360" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#DAA520" letter-spacing="4" font-style="italic">WEDDING MONTH</text>

  <!-- Day headers -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="13" font-weight="600" fill="#8B6914" letter-spacing="1">
    <text x="60" y="128" text-anchor="middle">SUN</text>
    <text x="160" y="128" text-anchor="middle">MON</text>
    <text x="260" y="128" text-anchor="middle">TUE</text>
    <text x="360" y="128" text-anchor="middle">WED</text>
    <text x="460" y="128" text-anchor="middle">THU</text>
    <text x="560" y="128" text-anchor="middle">FRI</text>
    <text x="660" y="128" text-anchor="middle">SAT</text>
  </g>

  <!-- Divider line -->
  <line x1="30" y1="140" x2="690" y2="140" stroke="#E8DCC8" stroke-width="1"/>

  <!-- Grid lines (horizontal) -->
  <line x1="30" y1="230" x2="690" y2="230" stroke="#F0EBE0" stroke-width="0.5"/>
  <line x1="30" y1="320" x2="690" y2="320" stroke="#F0EBE0" stroke-width="0.5"/>
  <line x1="30" y1="410" x2="690" y2="410" stroke="#F0EBE0" stroke-width="0.5"/>
  <line x1="30" y1="500" x2="690" y2="500" stroke="#F0EBE0" stroke-width="0.5"/>

  <!-- Week 1: Mar 1-7 -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" fill="#4A4A4A">
    <text x="60" y="172" text-anchor="middle">1</text>
    <text x="160" y="172" text-anchor="middle">2</text>
    <text x="260" y="172" text-anchor="middle">3</text>
    <text x="360" y="172" text-anchor="middle">4</text>
    <text x="460" y="172" text-anchor="middle">5</text>
    <text x="560" y="172" text-anchor="middle">6</text>
    <text x="660" y="172" text-anchor="middle">7</text>
  </g>

  <!-- Week 2: Mar 8-14 -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" fill="#4A4A4A">
    <text x="60" y="262" text-anchor="middle">8</text>
    <text x="260" y="262" text-anchor="middle">10</text>
    <text x="360" y="262" text-anchor="middle">11</text>
    <text x="460" y="262" text-anchor="middle">12</text>
    <text x="560" y="262" text-anchor="middle">13</text>
    <text x="660" y="262" text-anchor="middle">14</text>
  </g>

  <!-- March 9 highlight circle -->
  <circle cx="160" cy="256" r="22" fill="#8B1A1A" opacity="0.12"/>
  <text x="160" y="262" text-anchor="middle" font-family="'Inter', sans-serif" font-size="18" font-weight="700" fill="#8B1A1A">9</text>

  <!-- Event pill for Mar 9: Gaye Holud (gold/amber) — fits in MON column -->
  <rect x="115" y="274" width="90" height="20" rx="4" ry="4" fill="#DAA520"/>
  <text x="160" y="288" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#FFFDF7">Gaye Holud</text>

  <!-- Event pill for Mar 9: Wedding (deep crimson) — fits in MON column -->
  <rect x="115" y="298" width="90" height="20" rx="4" ry="4" fill="#8B1A1A"/>
  <text x="160" y="312" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#FFFDF7">Wedding 6 PM</text>

  <!-- Week 3: Mar 15-21 -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" fill="#4A4A4A">
    <text x="60" y="352" text-anchor="middle">15</text>
    <text x="160" y="352" text-anchor="middle">16</text>
    <text x="260" y="352" text-anchor="middle">17</text>
    <text x="360" y="352" text-anchor="middle">18</text>
    <text x="460" y="352" text-anchor="middle">19</text>
    <text x="560" y="352" text-anchor="middle">20</text>
    <text x="660" y="352" text-anchor="middle">21</text>
  </g>

  <!-- Week 4: Mar 22-28 -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" fill="#4A4A4A">
    <text x="160" y="442" text-anchor="middle">23</text>
    <text x="260" y="442" text-anchor="middle">24</text>
    <text x="360" y="442" text-anchor="middle">25</text>
    <text x="460" y="442" text-anchor="middle">26</text>
    <text x="560" y="442" text-anchor="middle">27</text>
    <text x="660" y="442" text-anchor="middle">28</text>
  </g>

  <!-- March 22 highlight circle -->
  <circle cx="60" cy="436" r="22" fill="#722F37" opacity="0.12"/>
  <text x="60" y="442" text-anchor="middle" font-family="'Inter', sans-serif" font-size="18" font-weight="700" fill="#722F37">22</text>

  <!-- Event pill for Mar 22: Reception (emerald green) — fits in SUN column -->
  <rect x="15" y="454" width="90" height="20" rx="4" ry="4" fill="#722F37"/>
  <text x="60" y="468" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" font-weight="600" fill="#FFFDF7">Reception 6:45PM</text>

  <!-- Week 5: Mar 29-31 -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" fill="#4A4A4A">
    <text x="60" y="532" text-anchor="middle">29</text>
    <text x="160" y="532" text-anchor="middle">30</text>
    <text x="260" y="532" text-anchor="middle">31</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="140" y1="575" x2="280" y2="575" stroke="#DAA520" stroke-width="1" opacity="0.5"/>
  <rect x="288" y="571" width="8" height="8" rx="1" transform="rotate(45, 292, 575)" fill="none" stroke="#DAA520" stroke-width="1" opacity="0.5"/>
  <line x1="305" y1="575" x2="580" y2="575" stroke="#DAA520" stroke-width="1" opacity="0.5"/>

  <!-- Legend — 3 distinct colors -->
  <g font-family="'Inter', sans-serif" font-size="11">
    <rect x="140" y="586" width="10" height="10" rx="2" fill="#DAA520"/>
    <text x="155" y="596" fill="#6B5B4B">Gaye Holud</text>
    <rect x="280" y="586" width="10" height="10" rx="2" fill="#8B1A1A"/>
    <text x="295" y="596" fill="#6B5B4B">Wedding Ceremony</text>
    <rect x="450" y="586" width="10" height="10" rx="2" fill="#722F37"/>
    <text x="465" y="596" fill="#6B5B4B">Reception</text>
  </g>
</svg>
